# =============================================================================
# FEA Compute Server - Docker Compose Configuration
# =============================================================================
#
# Usage:
#   docker-compose up -d          # Start in background
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop services
#   docker-compose up --build     # Rebuild and start
#
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # FEA Compute Server
  # ===========================================================================
  fea-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: fea-server:latest
    container_name: fea-server
    hostname: fea-server
    
    # Port mapping
    ports:
      - "8080:8080"
    
    # Volume mounts
    volumes:
      # Persistent job data
      - fea-data:/data
      # Read-only mesh files from host
      - ./meshes:/data/meshes:ro
      # Logs
      - fea-logs:/data/logs
    
    # Environment variables
    environment:
      - FEA_PORT=8080
      - FEA_WORKERS=4
      - FEA_DATA_DIR=/data
      # Memory limit for solver
      - FEA_MAX_MEMORY=8G
      # Logging level (debug, info, warn, error)
      - FEA_LOG_LEVEL=info
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    
    # Network
    networks:
      - fea-network

  # ===========================================================================
  # Nginx Reverse Proxy (Optional - for SSL termination)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: fea-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - fea-server
    networks:
      - fea-network
    restart: unless-stopped
    profiles:
      - production

  # ===========================================================================
  # Prometheus Metrics (Optional - for monitoring)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: fea-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - fea-network
    restart: unless-stopped
    profiles:
      - monitoring

  # ===========================================================================
  # Grafana Dashboard (Optional - for visualization)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: fea-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - fea-network
    restart: unless-stopped
    profiles:
      - monitoring

# =============================================================================
# Volumes
# =============================================================================
volumes:
  fea-data:
    driver: local
  fea-logs:
    driver: local
  nginx-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  fea-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
